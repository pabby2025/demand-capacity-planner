version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: capacityplanner
      POSTGRES_USER: capacityadmin
      POSTGRES_PASSWORD: localdevpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capacityadmin -d capacityplanner"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://capacityadmin:localdevpass@db:5432/capacityplanner
      EXCEL_PATH: /app/backend/large_sample_dataset.xlsx
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
